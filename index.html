<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist de Prontuário - Santa Casa de Rondonópolis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background: #f5f5f5; color: #2f2f2f; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 38px 42px; box-shadow: 0 2px 8px rgba(0,0,0,.10); min-height: 100vh; }
    header { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
    h1 { font-size: 58px; line-height: .9; letter-spacing: 2px; color: #0c65a7; font-weight: 800; }
    .logo-wrapper { width: 235px; display: flex; justify-content: flex-end; }
    .logo-wrapper img { width: 210px; max-width: 100%; height: auto; display: block; }
    .selector-wrapper { display: flex; align-items: center; gap: 10px; margin: 0 0 18px; padding: 12px 14px; background: #eef6fc; border: 1px solid #d7e8f5; border-radius: 10px; }
    .selector-wrapper label { font-weight: 700; color: #114c79; }
    .selector-wrapper select { flex: 1; max-width: 430px; padding: 9px 12px; border: 1px solid #2b6f9f; border-radius: 8px; background: #fff; font-size: 14px; color: #333; }
    .info-box { background: #eaf2fb; border-left: 5px solid #0d5c95; border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; font-size: 14px; line-height: 1.45; }
    .info-box .type { color: #144b70; font-weight: 700; margin-bottom: 8px; }
    .info-box ul { list-style: none; padding-left: 0; }
    .info-box li { margin-top: 5px; }
    .notice-box { border: 2px dashed #1d78b9; color: #154e75; border-radius: 8px; padding: 9px 12px; margin: -10px 0 18px; background: #fbfdff; font-size: 13px; line-height: 1.45; }
    .checklist-content { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 28px; }
    .section.span-2 { grid-column: 1 / -1; }
    .section-title { color: #fff; font-weight: 700; font-size: 15px; padding: 12px 18px; border-radius: 999px; margin-bottom: 10px; background: linear-gradient(135deg, #0d4f83 0%, #1a78bd 100%); }
    .items-list { list-style: none; }
    .item { display: block; border-bottom: 1px solid #e4e4e4; font-size: 13.5px; line-height: 1.35; }
    .item-row { display: flex; align-items: flex-start; gap: 13px; width: 100%; padding: 8px 0; border: 0; background: transparent; color: inherit; font: inherit; text-align: left; cursor: pointer; }
    .item-row:hover .item-text, .item-row:focus-visible .item-text { color: #0d5c95; }
    .item-row:focus-visible { outline: 2px solid #1a78bd; outline-offset: 3px; border-radius: 8px; }
    .item-circle { width: 21px; height: 21px; min-width: 21px; border: 3px solid #1d5d8d; border-radius: 50%; background: #fff; margin-top: 1px; transition: background-color .15s ease, box-shadow .15s ease; }
    .item.active .item-circle { background: #1d5d8d; box-shadow: inset 0 0 0 4px #fff; }
    .item-text { flex: 1; }
    .item-text strong { font-weight: 800; }
    .modal-overlay { position: fixed; inset: 0; z-index: 9999; display: none; align-items: center; justify-content: center; padding: 22px; background: rgba(0, 29, 51, .68); }
    .modal-overlay.show { display: flex; }
    .modal-content { width: min(1180px, 96vw); max-height: 92vh; overflow: hidden; background: #fff; border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,.36); display: flex; flex-direction: column; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 18px; border-bottom: 1px solid #e7edf3; background: #f8fbfe; }
    .modal-title { color: #0d5c95; font-size: 15px; font-weight: 800; line-height: 1.25; }
    .modal-close { border: 0; border-radius: 999px; background: #0d5c95; color: #fff; font-weight: 800; padding: 9px 14px; cursor: pointer; }
    .modal-close:hover, .modal-close:focus-visible { background: #0a4774; }
    .modal-body { padding: 18px; background: #fff; overflow: auto; }
    .modal-images { width: 100%; }
    .image-carousel { display: flex; gap: 16px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 4px 4px 12px; }
    .image-frame { flex: 0 0 100%; scroll-snap-align: center; border: 1px solid #dfe8f0; border-radius: 14px; background: #f8fbfe; padding: 10px; min-height: 220px; display: flex; align-items: center; justify-content: center; }
    .image-frame img { display: block; width: 100%; max-height: 68vh; object-fit: contain; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.12); background: #fff; }
    .image-frame .image-error { display: none; width: 100%; padding: 42px 18px; border: 2px dashed #1a78bd; border-radius: 12px; color: #0d5c95; text-align: center; font-weight: 700; }
    .carousel-toolbar { display: none; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; }
    .carousel-toolbar.show { display: flex; }
    .carousel-toolbar button { border: 0; border-radius: 999px; background: #0d5c95; color: #fff; font-weight: 800; padding: 9px 14px; cursor: pointer; }
    .carousel-toolbar button:hover, .carousel-toolbar button:focus-visible { background: #0a4774; }
    .carousel-hint { color: #5b6872; font-size: 12px; font-weight: 700; }
    .modal-caption { padding: 12px 18px 18px; color: #444; font-size: 13px; line-height: 1.4; background: #fff; border-top: 1px solid #eef2f5; }
    .modal-fallback { display: none; width: 100%; padding: 48px 22px; border: 2px dashed #1a78bd; border-radius: 14px; background: #f4f9fd; color: #0d5c95; text-align: center; font-weight: 700; }
    footer { margin-top: 34px; border-top: 1px solid #d6d6d6; padding-top: 18px; font-size: 14px; }
    .footer-field { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
    .footer-field label { white-space: nowrap; color: #333; }
    .footer-field .line { height: 1px; border-bottom: 2px solid #222; flex: 1; }
    @media (max-width: 760px) {
      body { padding: 10px; }
      .container { padding: 22px 18px; }
      header { align-items: center; }
      h1 { font-size: 38px; }
      .logo-wrapper { width: 145px; }
      .selector-wrapper { flex-direction: column; align-items: stretch; }
      .selector-wrapper select { max-width: none; }
      .checklist-content { grid-template-columns: 1fr; }
      .section.span-2 { grid-column: auto; }
      .footer-field { align-items: flex-start; flex-direction: column; }
      .footer-field .line { width: 100%; }
    }
    @page { size: A4 portrait; margin: 10mm; }
    @media print {
      body { background: #fff; padding: 0; }
      .container { box-shadow: none; max-width: none; width: 100%; min-height: auto; padding: 0; }
      .selector-wrapper { display: none; }
      h1 { font-size: 54px; }
      .logo-wrapper img { width: 190px; }
      .section-title { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .info-box { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .item { break-inside: avoid; }
      .item-row { cursor: default; }
      .modal-overlay { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CHECKLIST</h1>
      <div class="logo-wrapper"><img src="imagens/logo.png" alt="Santa Casa Rondonópolis" /></div>
    </header>

    <div class="selector-wrapper">
      <label for="checklistType">Tipo de Prontuário:</label>
      <select id="checklistType">
        <option value="cirurgico">Prontuário Cirúrgico</option>
        <option value="clinico">Prontuário Clínico</option>
        <option value="clinico-rn">Prontuário Clínico — RN</option>
        <option value="obstetrico">Prontuário Obstétrico</option>
        <option value="pa">Pronto Atendimento (PA)</option>
        <option value="ambulatorial-consulta">Ambulatorial — Consulta</option>
        <option value="ambulatorial-exames">Ambulatorial — Exames</option>
        <option value="ambulatorial-cirurgia">Ambulatorial — Cirurgia Ambulatorial</option>
        <option value="uti">Unidade Intensiva (UTI)</option>
      </select>
    </div>

    <div id="infoBox" class="info-box"></div>
    <div id="noticeBox"></div>
    <main id="checklistContent" class="checklist-content"></main>

    <footer>
      <div class="footer-field"><label>Responsável pela conferência:</label><div class="line"></div></div>
      <div class="footer-field"><label>Data / Horário:</label><div class="line"></div></div>
    </footer>
  </div>


  <div id="imageModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">Imagem do item selecionado</div>
        <button type="button" id="modalClose" class="modal-close">Voltar</button>
      </div>
      <div class="modal-body">
        <div id="modalImages" class="modal-images"></div>
        <div id="modalFallback" class="modal-fallback">Imagem não encontrada para este item.</div>
        <div id="carouselToolbar" class="carousel-toolbar" aria-label="Navegação do carrossel">
          <button type="button" id="carouselPrev">Anterior</button>
          <span class="carousel-hint">Arraste para o lado ou use os botões</span>
          <button type="button" id="carouselNext">Próxima</button>
        </div>
      </div>
      <div id="modalCaption" class="modal-caption"></div>
    </div>
  </div>

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getItemText(item) {
      return typeof item === "string" ? item : item.text;
    }

    function itemHtml(item) {
      const text = getItemText(item);
      const safe = escapeHtml(text);
      return typeof item === "object" && item.bold ? `<strong>${safe}</strong>` : safe;
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[–—]/g, "-")
        .replace(/[^a-z0-9\s-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    const itemImageRules = [
      { title: "Cirurgia segura e Integrador químico", match: "all", keys: ["cirurgia segura", "integrador quimico"], images: [CIMG + "cirurgia_segura.png", CIMG + "integrador_quimico.png"] },
      { title: "Identificação do RN / Pezinho", match: "all", keys: ["identificacao do rn", "pezinho"], images: [CIMG + "folha_amarela_rn.png", CIMG + "evolucao_enferm_rg_pezinho.png"] },
      { title: "Relatório de produtos / Aviso de cirurgia", match: "any", keys: ["relatorio de produtos por atendimento", "aviso de cirurgia", "folha de gastos"], images: [CIMG + "relatorio_anesteisa_aviso_cirurgia.png", CIMG + "folha_de_gasto.png"] },
      { title: "Relatório de anestesia", match: "any", keys: ["relatorio de anestesia", "anestesia"], images: [CIMG + "relatorio_anesteisa_0001.png", CIMG + "relatorio_anesteisa_0002.png"] },
      { title: "Contrato de prestação de serviços", match: "any", keys: ["contrato de prestacao"], images: [CIMG + "contrato_prestacao_servico_0001.png", CIMG + "contrato_prestacao_servico_0002.png"] },
      { title: "Termo de esclarecimento e responsabilidade", match: "any", keys: ["termo de esclarecimento", "declaracao e responsabilidade"], images: [CIMG + "termo_de_esclarecimento_0001.png", CIMG + "termo_de_esclarecimento_0002.png"] },
      { title: "Ficha de recepção do RN", match: "any", keys: ["ficha de recepcao do rn"], images: [CIMG + "ficha_de_recpcao_rn_0001.png", CIMG + "ficha_de_recpcao_rn_0002.png"] },
      { title: "Ficha de admissão da UTI neonatal", match: "any", keys: ["ficha de admissao da uti"], images: [CIMG + "ficha_admissao_uti_neo_0001.png", CIMG + "ficha_admissao_uti_neo_0002.png"] },
      { title: "Ficha de acompanhamento na SRPA", match: "any", keys: ["srpa"], images: [CIMG + "srpa_0001.png", CIMG + "srpa_0002.png"] },
      { title: "Enfermagem perioperatória", match: "any", keys: ["enfermagem perioperatoria"], images: [CIMG + "enfermagem_perioperatoria_0001.png", CIMG + "enfermagem_perioperatoria_0002.png"] },
      { title: "Sumário / Resumo de alta hospitalar", match: "any", keys: ["sumario", "resumo de alta"], images: [CIMG + "sumario_resumo_alta.png", CIMG + "relatorio_de_alta.png"] },
      { title: "Anamnese do paciente", match: "any", keys: ["anamnese"], images: [CIMG + "anamnese_do_paciente.png", CIMG + "anamnese.png"] },
      { title: "Laudo de Solicitação de AIH", match: "any", keys: ["aih", "internacao hospitalar", "operadora"], images: [CIMG + "laudo_solicitacao_aih.jpg"] },
      { title: "Guia / Autorização SISREG", match: "any", keys: ["sisreg"], images: [CIMG + "sisreg.webp"] },
      { title: "Prescrição do recém-nascido", match: "any", keys: ["prescricao do recem nascido", "prescricao do recem-nascido", "prescricao do rn"], images: [CIMG + "prescricao_do_rn.png"] },
      { title: "Prescrição médica", match: "any", keys: ["prescricao medica", "prescricao de alta", "prescricao de hemodialise"], images: [CIMG + "prescricao_medica.png"] },
      { title: "Descrição cirúrgica", match: "any", keys: ["descricao cirurgica", "partograma", "cateteres", "picc", "traqueostomia", "drenagem de torax"], images: [CIMG + "descricao_cirurgica.png"] },
      { title: "Formulário de avaliação pré-anestésica", match: "any", keys: ["pre anestesica"], images: [CIMG + "formulario_de_avaliacao_pre_anestesica.png"] },
      { title: "Verificação de cirurgia segura", match: "any", keys: ["verificacao de cirurgia segura", "checklist pre operatorio"], images: [CIMG + "cirurgia_segura_checklist_pre_operatorio.png"] },
      { title: "Cirurgia segura", match: "any", keys: ["cirurgia segura"], images: [CIMG + "cirurgia_segura.png"] },
      { title: "Integrador químico", match: "any", keys: ["integrador quimico"], images: [CIMG + "integrador_quimico.png"] },
      { title: "Evolução de enfermagem com registro do pezinho", match: "any", keys: ["registro do pezinho", "pezinho"], images: [CIMG + "evolucao_enferm_rg_pezinho.png"] },
      { title: "Identificação do RN", match: "any", keys: ["identificacao do rn", "ficha amarela", "folhinha amarela"], images: [CIMG + "folha_amarela_rn.png"] },
      { title: "Evolução médica do RN", match: "any", keys: ["evolucao medica do rn"], images: [CIMG + "evolucao_medica.png"] },
      { title: "Evolução médica", match: "any", keys: ["evolucao medica", "evolucoes medicas", "intensivista", "diarista", "permanencia"], images: [CIMG + "evolucao_medica.png"] },
      { title: "Evolução de enfermagem", match: "any", keys: ["evolucao de enfermagem", "registro diario"], images: [CIMG + "evolucao_enfermagem_registro_diario.png"] },
      { title: "Evolução da fisioterapia", match: "any", keys: ["fisioterapia"], images: [CIMG + "evolucao_da_fisioterapia.png"] },
      { title: "Declaração de nascido vivo", match: "any", keys: ["declaracao de nascido vivo"], images: [CIMG + "declaracao_de_nascido_vivo.jpg"] },
      { title: "Certidão de nascimento", match: "any", keys: ["certidao de nascimento"], images: [CIMG + "certidao_de_nascimento.jpg"] },
      { title: "Documento com foto", match: "any", keys: ["documento do paciente", "documento com foto", "documento do responsavel"], images: [CIMG + "documento_com_foto.png"] }
    ];

    function ruleMatches(rule, normalizedText) {
      const keys = rule.keys.map((key) => normalizeText(key));
      if (rule.match === "all") return keys.every((key) => normalizedText.includes(key));
      return keys.some((key) => normalizedText.includes(key));
    }

    function getReferenceData(itemText) {
      const normalized = normalizeText(itemText);
      const rule = itemImageRules.find((entry) => ruleMatches(entry, normalized));
      if (!rule) return { title: "Documento do checklist", images: [] };
      return { title: rule.title, images: rule.images };
    }

    function renderModalImages(images, itemText) {
      const modalImages = document.getElementById("modalImages");
      const modalFallback = document.getElementById("modalFallback");
      const toolbar = document.getElementById("carouselToolbar");
      if (!modalImages || !modalFallback) return;

      modalImages.innerHTML = "";
      modalFallback.style.display = "none";
      if (toolbar) toolbar.classList.remove("show");

      if (!images || !images.length) {
        modalFallback.style.display = "block";
        modalFallback.textContent = "Nenhuma imagem foi vinculada para este item.";
        return;
      }

      const carousel = document.createElement("div");
      carousel.className = "image-carousel";
      carousel.id = "imageCarousel";

      images.forEach((src, index) => {
        const frame = document.createElement("figure");
        frame.className = "image-frame";

        const img = document.createElement("img");
        img.src = src;
        img.alt = `${itemText} - imagem ${index + 1}`;
        img.loading = "lazy";
        img.onerror = function () {
          img.style.display = "none";
          const error = frame.querySelector(".image-error");
          if (error) error.style.display = "block";
        };

        const error = document.createElement("div");
        error.className = "image-error";
        error.textContent = "Imagem não encontrada no pacote.";

        frame.appendChild(img);
        frame.appendChild(error);
        carousel.appendChild(frame);
      });

      modalImages.appendChild(carousel);
      if (toolbar && images.length > 1) toolbar.classList.add("show");
    }

    function moveCarousel(direction) {
      const carousel = document.getElementById("imageCarousel");
      if (!carousel) return;
      const amount = carousel.clientWidth * direction;
      carousel.scrollBy({ left: amount, behavior: "smooth" });
    }

    function renderInfo(checklist) {
      if (checklist.orientationText) {
        return `<div class="type">▯ ${escapeHtml(checklist.title)} — ⚠ ${escapeHtml(checklist.orientationText)}</div>`;
      }
      const items = checklist.orientation.map((item) => `<li>⚠ ${escapeHtml(item)}</li>`).join("");
      return `<div class="type">▯ ${escapeHtml(checklist.title)}</div><ul>${items}</ul>`;
    }

    function renderChecklist(type) {
      const checklist = checklists[type];
      if (!checklist) return;

      document.getElementById("infoBox").innerHTML = renderInfo(checklist);
      document.getElementById("noticeBox").innerHTML = checklist.notice ? `<div class="notice-box">${escapeHtml(checklist.notice)}</div>` : "";

      document.getElementById("checklistContent").innerHTML = checklist.sections.map((section) => {
        const items = section.items.map((item) => {
          const text = getItemText(item);
          return `
            <li class="item">
              <button class="item-row" type="button" data-item-text="${escapeHtml(text)}" aria-label="Abrir imagem referente a: ${escapeHtml(text)}">
                <span class="item-circle" aria-hidden="true"></span>
                <span class="item-text">${itemHtml(item)}</span>
              </button>
            </li>
          `;
        }).join("");
        return `
          <section class="section${section.span ? " span-2" : ""}">
            <div class="section-title">${escapeHtml(section.title)}</div>
            <ul class="items-list">${items}</ul>
          </section>
        `;
      }).join("");
    }


    function openModal(itemText, triggerElement) {
      const overlay = document.getElementById("imageModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalCaption = document.getElementById("modalCaption");
      if (!overlay) return;

      document.querySelectorAll(".item.active").forEach((item) => item.classList.remove("active"));
      const itemElement = triggerElement ? triggerElement.closest(".item") : null;
      if (itemElement) itemElement.classList.add("active");

      const referenceData = getReferenceData(itemText);
      modalTitle.textContent = referenceData.title;
      modalCaption.textContent = itemText;
      renderModalImages(referenceData.images, itemText);

      overlay.classList.add("show");
      overlay.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      const closeButton = document.getElementById("modalClose");
      if (closeButton) closeButton.focus({ preventScroll: true });
    }

    function closeModal() {
      const overlay = document.getElementById("imageModal");
      const modalImages = document.getElementById("modalImages");
      if (!overlay) return;
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      if (modalImages) modalImages.innerHTML = "";
    }

    document.getElementById("checklistContent").addEventListener("click", function (event) {
      const row = event.target.closest(".item-row");
      if (!row) return;
      openModal(row.dataset.itemText || row.textContent.trim(), row);
    });

    document.getElementById("imageModal").addEventListener("click", function (event) {
      if (event.target === this) closeModal();
    });

    document.getElementById("modalClose").addEventListener("click", closeModal);
    document.getElementById("carouselPrev").addEventListener("click", function () { moveCarousel(-1); });
    document.getElementById("carouselNext").addEventListener("click", function () { moveCarousel(1); });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") closeModal();
    });

    document.getElementById("checklistType").addEventListener("change", function () {
      renderChecklist(this.value);
    });

    renderChecklist("cirurgico");
  </script>
</body>
</html>
