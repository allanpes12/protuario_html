<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist de Prontuário - Santa Casa de Rondonópolis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background: #f5f5f5; color: #2f2f2f; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 38px 42px; box-shadow: 0 2px 8px rgba(0,0,0,.10); min-height: 100vh; }
    header { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
    h1 { font-size: 58px; line-height: .9; letter-spacing: 2px; color: #0c65a7; font-weight: 800; }
    .logo-wrapper { width: 235px; display: flex; justify-content: flex-end; }
    .logo-wrapper img { width: 210px; max-width: 100%; height: auto; display: block; }
    .selector-wrapper { display: flex; align-items: center; gap: 10px; margin: 0 0 18px; padding: 12px 14px; background: #eef6fc; border: 1px solid #d7e8f5; border-radius: 10px; }
    .selector-wrapper label { font-weight: 700; color: #114c79; }
    .selector-wrapper select { flex: 1; max-width: 430px; padding: 9px 12px; border: 1px solid #2b6f9f; border-radius: 8px; background: #fff; font-size: 14px; color: #333; }
    .info-box { background: #eaf2fb; border-left: 5px solid #0d5c95; border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; font-size: 14px; line-height: 1.45; }
    .info-box .type { color: #144b70; font-weight: 700; margin-bottom: 8px; }
    .info-box ul { list-style: none; padding-left: 0; }
    .info-box li { margin-top: 5px; }
    .notice-box { border: 2px dashed #1d78b9; color: #154e75; border-radius: 8px; padding: 9px 12px; margin: -10px 0 18px; background: #fbfdff; font-size: 13px; line-height: 1.45; }
    .checklist-content { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 28px; }
    .section.span-2 { grid-column: 1 / -1; }
    .section-title { color: #fff; font-weight: 700; font-size: 15px; padding: 12px 18px; border-radius: 999px; margin-bottom: 10px; background: linear-gradient(135deg, #0d4f83 0%, #1a78bd 100%); }
    .items-list { list-style: none; }
    .item { display: flex; align-items: flex-start; gap: 13px; padding: 8px 0; border-bottom: 1px solid #e4e4e4; font-size: 13.5px; line-height: 1.35; }
    .item-circle { width: 21px; height: 21px; min-width: 21px; border: 3px solid #1d5d8d; border-radius: 50%; background: #fff; margin-top: 1px; }
    .item-text { flex: 1; }
    .item-text strong { font-weight: 800; }
    footer { margin-top: 34px; border-top: 1px solid #d6d6d6; padding-top: 18px; font-size: 14px; }
    .footer-field { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
    .footer-field label { white-space: nowrap; color: #333; }
    .footer-field .line { height: 1px; border-bottom: 2px solid #222; flex: 1; }
    @media (max-width: 760px) {
      body { padding: 10px; }
      .container { padding: 22px 18px; }
      header { align-items: center; }
      h1 { font-size: 38px; }
      .logo-wrapper { width: 145px; }
      .selector-wrapper { flex-direction: column; align-items: stretch; }
      .selector-wrapper select { max-width: none; }
      .checklist-content { grid-template-columns: 1fr; }
      .section.span-2 { grid-column: auto; }
      .footer-field { align-items: flex-start; flex-direction: column; }
      .footer-field .line { width: 100%; }
    }
    @page { size: A4 portrait; margin: 10mm; }
    @media print {
      body { background: #fff; padding: 0; }
      .container { box-shadow: none; max-width: none; width: 100%; min-height: auto; padding: 0; }
      .selector-wrapper { display: none; }
      h1 { font-size: 54px; }
      .logo-wrapper img { width: 190px; }
      .section-title { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .info-box { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .item { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CHECKLIST</h1>
      <div class="logo-wrapper"><img src="imagens/logo.png" alt="Santa Casa Rondonópolis" /></div>
    </header>

    <div class="selector-wrapper">
      <label for="checklistType">Tipo de Prontuário:</label>
      <select id="checklistType">
        <option value="cirurgico">Prontuário Cirúrgico</option>
        <option value="clinico">Prontuário Clínico</option>
        <option value="clinico-rn">Prontuário Clínico — RN</option>
        <option value="obstetrico">Prontuário Obstétrico</option>
        <option value="pa">Pronto Atendimento (PA)</option>
        <option value="ambulatorial-consulta">Ambulatorial — Consulta</option>
        <option value="ambulatorial-exames">Ambulatorial — Exames</option>
        <option value="ambulatorial-cirurgia">Ambulatorial — Cirurgia Ambulatorial</option>
        <option value="uti">Unidade Intensiva (UTI)</option>
      </select>
    </div>

    <div id="infoBox" class="info-box"></div>
    <div id="noticeBox"></div>
    <main id="checklistContent" class="checklist-content"></main>

    <footer>
      <div class="footer-field"><label>Responsável pela conferência:</label><div class="line"></div></div>
      <div class="footer-field"><label>Data / Horário:</label><div class="line"></div></div>
    </footer>
  </div>

  <script>
    const orientationItems = [
      "Todos os documentos deverão estar corretamente preenchidos (letra legível, assinados e carimbados).",
      "Evoluções e prescrições devem ser diárias.",
      "Datas e horários coerentes.",
      "Sem lacunas (dias sem evolução)."
    ];

    const identificacaoPadrao = "Anamnese do paciente – Identificação completa: nome, telefone, data de nascimento, CPF, CNS (Cartão Nacional do SUS), endereço, bairro, CEP, nome da mãe, município, médico, convênio e registro do atendimento.";

    const termosCompletos = [
      "Contrato de prestação de serviços médicos e hospitalares assinado pelo paciente e/ou responsável.",
      "Termo de esclarecimento, declaração e responsabilidade assinado pelo paciente e/ou responsável.",
      "Cópia do documento do paciente com foto.",
      "Se menor de idade, cópia do documento com foto do responsável.",
      "Termo de consentimento para intervenção cirúrgica."
    ];

    const termosSemConsentimento = [
      "Contrato de prestação de serviços médicos e hospitalares assinado pelo paciente e/ou responsável.",
      "Termo de esclarecimento, declaração e responsabilidade assinado pelo paciente e/ou responsável.",
      "Cópia do documento do paciente com foto.",
      "Se menor de idade, cópia do documento com foto do responsável."
    ];

    const documentoPacienteResponsavel = [
      "Cópia do documento do paciente com foto.",
      "Se menor de idade, cópia do documento com foto do responsável."
    ];

    const checklists = {
      cirurgico: {
        title: "Prontuário Cirúrgico",
        orientation: orientationItems,
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais – Médico", items: [
            "Laudo para Solicitação de Autorização de Internação Hospitalar (AIH) e/ou Guia de Autorização da Operadora.",
            "Guia de Autorização SISREG.",
            "Anamnese do paciente.",
            "Sumário / Resumo de alta hospitalar.",
            "Evoluções médicas compatíveis com o tempo de permanência.",
            "Prescrição médica.",
            "Descrição cirúrgica.",
            "Relatório de anestesia.",
            "Formulário de avaliação pré-anestésica.",
            "Relatório de produtos por atendimento / Aviso de cirurgia (folha de gastos).",
            "Ficha de acompanhamento do paciente na SRPA."
          ] },
          { title: "Procedimentos e Registros Complementares", items: [
            "Enfermagem perioperatória.",
            "Cirurgia segura.",
            "Integrador químico.",
            "Registro de utilização de OPME (se houver).",
            "Verificação de cirurgia segura – checklist pré-operatório.",
            "Solicitação de exame anatomopatológico (se houver).",
            "Imprimir exames laboratoriais e laudo de exames de imagem.",
            "Evolução de enfermagem – registro diário."
          ] },
          { title: "Termos e Documentação", items: termosCompletos }
        ]
      },
      clinico: {
        title: "Prontuário Clínico",
        orientation: orientationItems,
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais", items: [
            "Laudo para Solicitação de Autorização de Internação Hospitalar (AIH) e/ou Guia de Autorização da Operadora.",
            "Guia de Autorização SISREG.",
            "Anamnese do paciente.",
            "Sumário / Resumo de alta hospitalar.",
            "Evoluções médicas subsequentes compatíveis com o tempo de permanência.",
            "Prescrição médica.",
            "Evolução de enfermagem – registro diário.",
            "Imprimir exames laboratoriais e laudo de exames de imagem.",
            "Evolução da fisioterapia."
          ] },
          { title: "Termos e Documentação", span: true, items: termosCompletos }
        ]
      },
      "clinico-rn": {
        title: "Prontuário Clínico – RN",
        orientation: orientationItems,
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais", items: [
            "Laudo para Solicitação de Autorização de Internação Hospitalar (AIH) e/ou Guia de Autorização da Operadora.",
            "Guia de Autorização SISREG.",
            "Anamnese do paciente.",
            "Sumário / Resumo de alta hospitalar."
          ] },
          { title: "Registros do Recém-Nascido", items: [
            "Identificação do RN (ficha amarela).",
            "Evolução de enfermagem com registro do pezinho.",
            "Ficha de recepção do RN.",
            "Caso o RN venha transferido da UTI: ficha de admissão da UTI.",
            "Evoluções médicas subsequentes compatíveis com o tempo de permanência.",
            "Prescrição médica.",
            "Evolução de enfermagem – registro diário.",
            "Imprimir exames laboratoriais e laudo de exames de imagem.",
            "Evolução da fisioterapia."
          ] },
          { title: "Termos e Documentação", items: termosSemConsentimento }
        ]
      },
      obstetrico: {
        title: "Prontuário Obstétrico",
        orientation: orientationItems,
        notice: "⚠ Caso o bebê fique internado: tirar cópia de identificação do RN (folha amarela), evolução de enfermagem com registro do pezinho, ficha de recepção do RN e 1ª evolução médica — permanecendo na conta da mãe.",
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais – Médico e Parto", items: [
            "Ficha de acolhimento e classificação de risco.",
            "Laudo para Solicitação de Autorização de Internação Hospitalar (AIH) e/ou Guia de Autorização da Operadora.",
            "Guia de Autorização SISREG.",
            "Anamnese do paciente.",
            "Sumário / Resumo de alta hospitalar.",
            "Evoluções médicas compatíveis com o tempo de permanência.",
            "Prescrição médica.",
            "Partograma e/ou Descrição Cirúrgica.",
            "Relatório de anestesia.",
            "Formulário de avaliação pré-anestésica.",
            "Relatório de produtos por atendimento / Aviso de cirurgia (folha de gastos).",
            "Ficha de acompanhamento do paciente na SRPA.",
            "Enfermagem perioperatória.",
            "Cirurgia segura e Integrador químico.",
            "Imprimir exames laboratoriais e laudo de exames de imagem.",
            "Laqueadura / vasectomia, se houver (planejamento familiar).",
            "Cardiotocografia fetal (se houver).",
            "Evolução de enfermagem – registro diário."
          ] },
          { title: "Recém-Nascido (RN)", items: [
            "Identificação do RN (pezinho + folhinha amarela).",
            "Ficha de recepção do RN.",
            "Evolução de enfermagem com o registro do pezinho.",
            "Evolução médica do RN.",
            "Prescrição do recém-nascido.",
            "Exames do recém-nascido.",
            "Evolução de enfermagem do RN – registro diário.",
            "Declaração de nascido vivo.",
            "Certidão de nascimento."
          ] },
          { title: "Termos e Documentação", items: [
            "Ficha de acolhimento e classificação de risco.",
            "Contrato de prestação de serviços médicos e hospitalares assinado pelo paciente e/ou responsável.",
            "Termo de esclarecimento, declaração e responsabilidade assinado pelo paciente e/ou responsável.",
            "Termo de consentimento para intervenção cirúrgica.",
            "Cópia do documento do paciente com foto.",
            "Se menor de idade, cópia do documento com foto do responsável."
          ] }
        ]
      },
      pa: {
        title: "Pronto Atendimento (PA)",
        orientation: orientationItems,
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais", items: [
            "Ficha de acolhimento e classificação de risco.",
            "Laudo para Solicitação de Autorização de Internação Hospitalar (AIH) e/ou Guia de Autorização da Operadora.",
            "Guia de Autorização SISREG.",
            "Anamnese do paciente.",
            "Evoluções médicas compatíveis com o tempo de permanência.",
            "Prescrição médica.",
            "Prescrição de alta médica.",
            "Descrição cirúrgica (se houver pequenos procedimentos).",
            "Evolução de enfermagem.",
            "Imprimir exames laboratoriais e laudo de exames de imagem."
          ] },
          { title: "Termos e Documentação", span: true, items: [
            "Ficha de acolhimento e classificação de risco.",
            "Contrato de prestação de serviços médicos e hospitalares assinado pelo paciente e/ou responsável.",
            "Termo de esclarecimento, declaração e responsabilidade assinado pelo paciente e/ou responsável.",
            "Cópia do documento do paciente com foto.",
            "Se menor de idade, cópia do documento com foto do responsável."
          ] }
        ]
      },
      "ambulatorial-consulta": {
        title: "Ambulatorial – Consulta",
        orientation: orientationItems,
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais", items: [
            "Guia de Autorização SISREG.",
            "Anamnese do paciente."
          ] },
          { title: "Termos e Documentação", span: true, items: documentoPacienteResponsavel }
        ]
      },
      "ambulatorial-exames": {
        title: "Ambulatorial – Exames",
        orientation: orientationItems,
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais", items: [
            "Laudo para Solicitação de Autorização de Internação Hospitalar (AIH) e/ou Guia de Autorização da Operadora.",
            "Guia de Autorização SISREG.",
            "Solicitação médica de exames devidamente registrada e autorizada.",
            "Autorização / Guia do exame (se aplicável).",
            "Ficha de recepção do laboratório.",
            { text: "Imprimir resultados dos exames laboratoriais anexados ao prontuário.", bold: true },
            "Exames de tomografia computadorizada – necessitam de APAC autorizada."
          ] },
          { title: "Termos e Documentação", span: true, items: documentoPacienteResponsavel }
        ]
      },
      "ambulatorial-cirurgia": {
        title: "Ambulatorial – Cirurgia Ambulatorial",
        orientation: orientationItems,
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais", items: [
            "Autorização de procedimentos ambulatoriais (SISREG)",
            "Anamnese do paciente.",
            "Sumário / Resumo de alta hospitalar.",
            "Evolução médica.",
            "Descrição cirúrgica.",
            "Enfermagem perioperatória.",
            "Cirurgia segura.",
            "Registro de utilização de OPME (se houver).",
            "Evolução de enfermagem – registro diário."
          ] },
          { title: "Termos e Documentação", span: true, items: termosCompletos }
        ]
      },
      uti: {
        title: "Unidade Intensiva (UTI)",
        orientationText: "Todos os documentos deverão estar corretamente preenchidos (letra legível, assinados e carimbados). Evoluções e prescrições devem ser diárias, com datas e horários coerentes, sem lacunas.",
        sections: [
          { title: "Identificação e Abertura", items: [identificacaoPadrao] },
          { title: "Registros Assistenciais – Médico", items: [
            "Guia de autorização da cirurgia (SUS – SISREG e/ou operadoras).",
            "Anamnese do paciente.",
            "Sumário / Resumo de alta hospitalar.",
            "Evolução médica do intensivista – compatível com o tempo de permanência.",
            "Evolução médica diarista – turno diurno e noturno.",
            "Prescrição médica.",
            "Prescrição de hemodiálise (se houver)."
          ] },
          { title: "Procedimentos e Dispositivos", items: [
            "Descrição cirúrgica, se houver procedimentos (cateteres, PICC, traqueostomia, drenagem de tórax, hemodiálise).",
            "Relatório de anestesia (se houver).",
            "Formulário de avaliação pré-anestésica.",
            "Relatório de produtos por atendimento / Aviso de cirurgia (folha de gastos).",
            "Ficha de acompanhamento na SRPA.",
            "Enfermagem perioperatória.",
            "Cirurgia segura e Integrador químico.",
            "Registro de utilização de OPME (se houver).",
            "Verificação de cirurgia segura – checklist pré-operatório.",
            "Solicitação de exame anatomopatológico (se houver)."
          ] },
          { title: "Registros Complementares", items: [
            "Evolução diária do serviço de fisioterapia.",
            "Evolução de enfermagem – registro diário.",
            "Eletrocardiograma.",
            "Imprimir exames laboratoriais e laudo de exames de imagem."
          ] },
          { title: "Termos e Documentação", span: true, items: termosCompletos }
        ]
      }
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function itemHtml(item) {
      const text = typeof item === "string" ? item : item.text;
      const safe = escapeHtml(text);
      return typeof item === "object" && item.bold ? `<strong>${safe}</strong>` : safe;
    }

    function renderInfo(checklist) {
      if (checklist.orientationText) {
        return `<div class="type">▯ ${escapeHtml(checklist.title)} — ⚠ ${escapeHtml(checklist.orientationText)}</div>`;
      }
      const items = checklist.orientation.map((item) => `<li>⚠ ${escapeHtml(item)}</li>`).join("");
      return `<div class="type">▯ ${escapeHtml(checklist.title)}</div><ul>${items}</ul>`;
    }

    function renderChecklist(type) {
      const checklist = checklists[type];
      if (!checklist) return;

      document.getElementById("infoBox").innerHTML = renderInfo(checklist);
      document.getElementById("noticeBox").innerHTML = checklist.notice ? `<div class="notice-box">${escapeHtml(checklist.notice)}</div>` : "";

      document.getElementById("checklistContent").innerHTML = checklist.sections.map((section) => {
        const items = section.items.map((item) => `
          <li class="item">
            <span class="item-circle" aria-hidden="true"></span>
            <span class="item-text">${itemHtml(item)}</span>
          </li>
        `).join("");
        return `
          <section class="section${section.span ? " span-2" : ""}">
            <div class="section-title">${escapeHtml(section.title)}</div>
            <ul class="items-list">${items}</ul>
          </section>
        `;
      }).join("");
    }

    document.getElementById("checklistType").addEventListener("change", function () {
      renderChecklist(this.value);
    });

    renderChecklist("cirurgico");
  </script>
</body>
</html>
